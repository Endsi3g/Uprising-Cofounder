services:
  db:
    image: postgres:latest
    container_name: uprising-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uprising}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uprising_pass}
      POSTGRES_DB: ${POSTGRES_DB:-uprising_crm}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uprising} -d ${POSTGRES_DB:-uprising_crm}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: uprising-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uprising}:${POSTGRES_PASSWORD:-uprising_pass}@db:5432/${POSTGRES_DB:-uprising_crm}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      # ── LLM Provider ──────────────────────────────────
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-mistralai/mixtral-8x7b-instruct}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      # ── Optional services ──────────────────────────────
      BLAND_API_KEY: ${BLAND_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWENTY_API_KEY: ${TWENTY_API_KEY}
      TWENTY_API_URL: ${TWENTY_API_URL:-https://api.twenty.com}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3000:3000"
      - "11434:11434"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: uprising-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
