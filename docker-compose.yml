version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: uprising-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uprising}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uprising_pass}
      POSTGRES_DB: ${POSTGRES_DB:-uprising_crm}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: uprising-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uprising}:${POSTGRES_PASSWORD:-uprising_pass}@db:5432/${POSTGRES_DB:-uprising_crm}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    ports:
      - "3000:3000"
      - "11434:11434"
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: uprising-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
